name: Sync adult rule list

on:
  schedule:
    - cron: "23 20 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-adult-list
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate adult rule list
        run: bash scripts/sync-adult-list.sh

      - name: Validate rule list
        run: |
          test -s rule/adult.list
          awk 'NF && $0 !~ /^##/ && $0 !~ /^DOMAIN-SUFFIX,[A-Za-z0-9._-]+$/ { print NR ":" $0; bad=1 } END { exit bad }' rule/adult.list
          test -z "$(awk 'NF && $0 !~ /^##/ { print }' rule/adult.list | sort | uniq -d)"

      - name: Commit and push changes
        run: |
          if git diff --quiet -- rule/adult.list; then
            echo "No adult rule list changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rule/adult.list
          git commit -m "Sync adult site rule list"
          git push
