name: Sync upstream AdBlock modules

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-adblock-modules
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync modules and dependencies
        run: bash scripts/sync-adblock-modules.sh

      - name: Validate generated files
        run: |
          bash -n scripts/sync-adblock-modules.sh
          test "$(awk -F '\t' 'NF && $1 !~ /^#/ { count++ } END { print count+0 }' scripts/adblock-module-sources.tsv)" -eq 5

          while IFS=$'\t' read -r target source name description author homepage extra; do
            if [ -z "${target:-}" ] || [[ "$target" == \#* ]]; then
              continue
            fi
            test -z "${extra:-}"
            test -s "$target"
            grep -q "^#!name=$name$" "$target"
            grep -q '^#!category=AdBlock$' "$target"
            grep -Eq '^#!version=[0-9]+\.[0-9]+\.[0-9]+$' "$target"
            grep -Eq '^#!date=[0-9]{4}-[0-9]{2}-[0-9]{2}$' "$target"
          done < scripts/adblock-module-sources.tsv

          if rg -n 'script-path\s*=\s*https?://(?!raw\.githubusercontent\.com/anyforker/Surge/main/module/script/adblock/)' \
            module/app-adblock.sgmodule module/youtube-enhance.sgmodule \
            module/youtube-adblock.sgmodule module/wechat-adblock.sgmodule \
            module/weibo-lite-adblock.sgmodule --pcre2; then
            exit 1
          fi
          if rg -n 'data="https?://(?!raw\.githubusercontent\.com/anyforker/Surge/main/module/resource/adblock/)' \
            module/app-adblock.sgmodule module/youtube-enhance.sgmodule \
            module/youtube-adblock.sgmodule module/wechat-adblock.sgmodule \
            module/weibo-lite-adblock.sgmodule --pcre2; then
            exit 1
          fi

          npm test
          git diff --check -- . \
            ':!module/app-adblock.sgmodule' \
            ':!module/youtube-enhance.sgmodule' \
            ':!module/youtube-adblock.sgmodule' \
            ':!module/wechat-adblock.sgmodule' \
            ':!module/weibo-lite-adblock.sgmodule' \
            ':!module/script/adblock' \
            ':!module/resource/adblock'

      - name: Commit and push changes
        run: |
          paths=(
            module/app-adblock.sgmodule
            module/youtube-enhance.sgmodule
            module/youtube-adblock.sgmodule
            module/wechat-adblock.sgmodule
            module/weibo-lite-adblock.sgmodule
            module/script/adblock
            module/resource/adblock
          )
          if [ -z "$(git status --porcelain -- "${paths[@]}")" ]; then
            echo "No upstream AdBlock changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${paths[@]}"
          git commit -m "Sync upstream AdBlock modules"
          git push
