name: Sync upstream rule sets

on:
  schedule:
    - cron: "37 19 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-rule-sets
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate synced rule sets
        run: bash scripts/sync-rule-sets.sh

      - name: Validate synced rule sets
        run: |
          awk -F '\t' 'NF && $1 !~ /^#/ { count[$1]++ } END { for (target in count) if (count[target] > 1) { print target; bad=1 } exit bad }' scripts/rule-set-sources.tsv
          while IFS=$'\t' read -r target source mode extra; do
            if [ -z "${target:-}" ] || [[ "$target" == \#* ]]; then
              continue
            fi
            mode="${mode:-mirror}"
            test -z "${extra:-}"
            test -s "$target"
            grep -q '^## Synced Surge rule set$' "$target"
            grep -q "^## Source: $source$" "$target"
            grep -q "^## Mode: $mode$" "$target"

            case "$mode" in
              mirror)
                ;;
              geosite-domain-suffix)
                awk 'NF && $0 !~ /^##/ && $0 !~ /^DOMAIN-SUFFIX,[A-Za-z0-9._-]+$/ { print FILENAME ":" NR ":" $0; bad=1 } END { exit bad }' "$target"
                test -z "$(awk 'NF && $0 !~ /^##/ { print }' "$target" | sort | uniq -d)"
                ;;
              *)
                echo "Unsupported sync mode: $mode" >&2
                exit 1
                ;;
            esac
          done < scripts/rule-set-sources.tsv

      - name: Commit and push changes
        run: |
          if git diff --quiet -- rule/upstream; then
            echo "No upstream rule set changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rule/upstream
          git commit -m "Sync upstream rule sets"
          git push
